name: Release

# Trigger on any pushed tag that looks like a version (v0.2.0, v1.0.0-rc1,
# etc). Manual dispatch is also supported so you can rebuild without
# cutting a new tag — useful when CI flaked.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0). Leave blank to build HEAD."
        required: false

jobs:
  # -------------------------------------------------------------------
  # macOS .app bundle. Produces Tideway-macOS.zip containing
  # the .app — users drag it to /Applications. Unsigned / unnotarized
  # so first-launch shows Gatekeeper's "cannot be verified" warning;
  # README tells them to right-click → Open.
  # -------------------------------------------------------------------
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-mac.spec --noconfirm

      - name: Build DMG
        # DMG is the canonical macOS install format — Finder mounts
        # the image, shows the drag-to-Applications window, users
        # eject when done. ZIP technically works but fails the
        # Mac-native install expectation, so we ship only the DMG.
        # Name matches the auto-updater's convention:
        # Tideway-<version>.dmg.
        run: bash scripts/build_dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Tideway-macOS
          path: dist/Tideway-*.dmg
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Windows onedir bundle. Produces Tideway-Windows.zip with
  # the full dist/Tideway/ folder inside. Users unzip and run
  # Tideway.exe. SmartScreen warning on first launch; README
  # covers "More info → Run anyway."
  # -------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-win.spec --noconfirm

      - name: Zip dist folder
        # Compress-Archive is built-in on windows-latest — no need to
        # shell out to 7zip. `-CompressionLevel Optimal` trims ~20% off
        # the archive vs. the default Fastest.
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Tideway/* `
            -DestinationPath dist/Tideway-Windows.zip `
            -CompressionLevel Optimal

      - uses: actions/upload-artifact@v4
        with:
          name: Tideway-Windows
          path: dist/Tideway-Windows.zip
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Attach the artifacts to the GitHub Release. Only runs on a real
  # tag push — manual dispatch still produces the zips as workflow
  # artifacts but doesn't create a release.
  # -------------------------------------------------------------------
  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Tideway-macOS
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: Tideway-Windows
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          # Glob rather than explicit filename so the Mac DMG's
          # version-stamped name (Tideway-0.1.0.dmg, etc.) lands
          # alongside the Windows zip without hardcoding the
          # version in two places.
          files: |
            artifacts/Tideway-*.dmg
            artifacts/Tideway-Windows.zip
          # draft: true preserves an existing draft's state. If the
          # release doesn't exist yet (a push with no manually-created
          # draft), one is created as a draft for the maintainer to
          # review before publishing. Keeps curated release notes
          # written before the tag was pushed from getting wiped.
          draft: true
          # generate_release_notes: false so curated notes written
          # into a pre-existing draft aren't overwritten. When
          # creating a fresh release from scratch the body will be
          # empty; run `gh release edit vX.Y.Z --notes-file ...` or
          # fill it in the GitHub UI before publishing.
          generate_release_notes: false
          # Mark tags containing a hyphen (v0.2.0-rc1 etc.) as
          # prereleases automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
