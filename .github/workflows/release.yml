name: Release

# Trigger on any pushed tag that looks like a version (v0.2.0, v1.0.0-rc1,
# etc). Manual dispatch is also supported so you can rebuild without
# cutting a new tag — useful when CI flaked.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0). Leave blank to build HEAD."
        required: false

# Single source of truth for runtime versions. Bumping either here
# also has to be matched in .github/workflows/test.yml so CI and the
# release runner agree on what they're testing against.
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------
  # macOS .app bundle. Produces Tideway-macOS.zip containing
  # the .app — users drag it to /Applications. Unsigned / unnotarized
  # so first-launch shows Gatekeeper's "cannot be verified" warning;
  # README tells them to right-click → Open.
  # -------------------------------------------------------------------
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-mac.spec --noconfirm

      - name: Verify native libraries bundled
        # Backstop against the curl-cffi-missing-from-bundle (v0.4.7)
        # regression. PyInstaller's static analysis routinely misses
        # native libs that get loaded via ctypes / CFFI at runtime,
        # and curl-cffi falling back to plain requests would silently
        # drop our TLS-fingerprint match.
        #
        # tls_client used to be checked here too — we deliberately
        # stopped bundling it in v0.4.11 because its Go-CGO DLL was
        # crashing the Windows app, and spotapi now talks to Spotify
        # through curl-cffi via app/spotify_curl_session.py instead.
        # If you're tempted to add it back: don't, the broken
        # transport stays out of the bundle on purpose.
        run: |
          set -e
          APP_DIR="dist/Tideway.app/Contents"
          required_globs=(
            "*/curl_cffi/_wrapper*.so"
          )
          for pat in "${required_globs[@]}"; do
            count=$(find "$APP_DIR" -path "$pat" 2>/dev/null | wc -l | tr -d ' ')
            if [ "$count" -eq 0 ]; then
              echo "::error ::Missing native library matching $pat in macOS bundle"
              echo "PyInstaller didn't pick up a runtime-loaded dylib."
              echo "Check the collect_all() list in Tideway-mac.spec."
              exit 1
            fi
            echo "OK: found $count file(s) matching $pat"
          done

      - name: Build DMG
        # DMG is the canonical macOS install format — Finder mounts
        # the image, shows the drag-to-Applications window, users
        # eject when done. ZIP technically works but fails the
        # Mac-native install expectation, so we ship only the DMG.
        # Name matches the auto-updater's convention:
        # Tideway-<version>.dmg.
        run: bash scripts/build_dmg.sh

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-macOS
          path: dist/Tideway-*.dmg
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Windows. Produces Tideway-setup-<version>.exe — the Inno Setup
  # installer. Users double-click it, click through the wizard, get a
  # Start Menu entry + uninstaller registered with Apps & features.
  # SmartScreen warning on first launch (build is unsigned); README
  # covers "More info → Run anyway." The auto-update install button
  # downloads and runs this same .exe.
  # -------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-win.spec --noconfirm

      - name: Verify native libraries bundled
        # Backstop against the curl-cffi-missing-from-bundle (v0.4.7)
        # regression. PyInstaller's static analysis routinely misses
        # native libs that get loaded via ctypes / CFFI at runtime,
        # and curl-cffi falling back to plain requests would silently
        # drop our TLS-fingerprint match.
        #
        # tls-client-*.dll used to be checked here too — we
        # deliberately stopped bundling it in v0.4.11 because its
        # Go-CGO DLL was crashing the Windows app at offset 0x66621
        # on first Spotify enrichment call, and spotapi now talks to
        # Spotify through curl-cffi via app/spotify_curl_session.py
        # instead. If you're tempted to add it back: don't, the
        # broken transport stays out of the bundle on purpose.
        shell: pwsh
        run: |
          $appRoot = "dist\Tideway"
          $missing = $false
          foreach ($pat in @("_wrapper*")) {
            $files = Get-ChildItem -Path $appRoot -Recurse -Filter $pat -ErrorAction SilentlyContinue
            if (-not $files) {
              Write-Host "::error ::Missing native library matching $pat in Windows bundle"
              $missing = $true
            } else {
              Write-Host "OK: found $($files.Count) file(s) matching $pat"
            }
          }
          if ($missing) {
            Write-Host "PyInstaller didn't pick up a runtime-loaded DLL. Check collect_all() in Tideway-win.spec."
            exit 1
          }

      - name: Install Inno Setup
        # Chocolatey is preinstalled on windows-latest. The package
        # name is `innosetup`; --no-progress keeps the log readable.
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        # ISCC.exe lives in the standard Program Files (x86) location
        # after the choco install. Output filename
        # (Tideway-setup-<version>.exe) is set by scripts/Tideway.iss.
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\Tideway.iss

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-Windows
          path: dist/Tideway-setup-*.exe
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Windows ARM64. Same flow as build-windows but on a native ARM64
  # runner so PyInstaller produces an ARM64 binary and pip pulls the
  # win_arm64 wheels (sounddevice ships separate per-arch wheels with
  # the matching libportaudio*.dll, so an x64 build cannot be used on
  # an ARM64 host even under Prism emulation).
  #
  # Output: Tideway-setup-<version>-arm64.exe.
  # -------------------------------------------------------------------
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: "arm64"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-win.spec --noconfirm

      - name: Verify native libraries bundled
        # Backstop against the curl-cffi-missing-from-bundle (v0.4.7)
        # regression. PyInstaller's static analysis routinely misses
        # native libs that get loaded via ctypes / CFFI at runtime,
        # and curl-cffi falling back to plain requests would silently
        # drop our TLS-fingerprint match.
        #
        # tls-client-*.dll used to be checked here too — we
        # deliberately stopped bundling it in v0.4.11 because its
        # Go-CGO DLL was crashing the Windows app at offset 0x66621
        # on first Spotify enrichment call, and spotapi now talks to
        # Spotify through curl-cffi via app/spotify_curl_session.py
        # instead. If you're tempted to add it back: don't, the
        # broken transport stays out of the bundle on purpose.
        shell: pwsh
        run: |
          $appRoot = "dist\Tideway"
          $missing = $false
          foreach ($pat in @("_wrapper*")) {
            $files = Get-ChildItem -Path $appRoot -Recurse -Filter $pat -ErrorAction SilentlyContinue
            if (-not $files) {
              Write-Host "::error ::Missing native library matching $pat in Windows bundle"
              $missing = $true
            } else {
              Write-Host "OK: found $($files.Count) file(s) matching $pat"
            }
          }
          if ($missing) {
            Write-Host "PyInstaller didn't pick up a runtime-loaded DLL. Check collect_all() in Tideway-win.spec."
            exit 1
          }

      - name: Install Inno Setup
        # Chocolatey on the ARM64 runner installs the x86 ISCC.exe; it
        # runs fine under Prism emulation and the installer it produces
        # is the architecture we tell it to target via /DBuildArch.
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        # /DBuildArch=arm64 makes the .iss script append "-arm64" to the
        # output filename and pin ArchitecturesAllowed to arm64.
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DBuildArch=arm64 scripts\Tideway.iss

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-Windows-arm64
          path: dist/Tideway-setup-*-arm64.exe
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Linux Flatpak — the native-window path. Replaced the frozen
  # PyInstaller AppImage in v1.11.0 because the AppImage couldn't
  # import the host's PyGObject/WebKit2GTK and pywebview fell back
  # to opening the app in the system browser, which was not
  # acceptable. The Flatpak builds under the GNOME 49 runtime
  # (Python 3.13, GTK 3, WebKit2 4.1), so pywebview picks the GTK
  # backend and the user gets a real native window. See
  # docs/linux-flatpak.md.
  #
  # We install flatpak-builder + the GNOME 49 runtime on a stock
  # ubuntu-22.04 runner rather than running inside a
  # bilelmoussaoui/flatpak-github-actions container. That image lags
  # GNOME releases by a few months; doing the install ourselves means
  # the build mirrors what was verified manually in the dev VM and we
  # control which runtime version ships.
  # -------------------------------------------------------------------
  build-linux-flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install flatpak + flatpak-builder + elfutils
        # elfutils provides eu-strip, which flatpak-builder shells
        # out to for debuginfo extraction. It isn't pulled in as a
        # hard dep of flatpak-builder on Ubuntu 22.04, so a stock
        # runner fails with "Failed to execute child process
        # eu-strip" the first time a module produces an ELF
        # binary.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder ostree elfutils
          flatpak --version
          flatpak-builder --version
          eu-strip --version | head -1

      - name: Add Flathub remote
        # User-scoped to match how end users add it; CI doesn't need
        # the system-wide install, and user-scope avoids needing sudo
        # on every flatpak invocation.
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME 49 runtime + Node20 SDK extension
        # The manifest pins GNOME 49 (freedesktop 25.08 base, Python
        # 3.13). Node20 SDK extension is needed in the build sandbox
        # for the web bundle (manifest points npm at an offline cache
        # vendored by flatpak-node-generator).
        run: |
          flatpak install --user -y --no-deps flathub \
            org.gnome.Platform//49 \
            org.gnome.Sdk//49 \
            org.freedesktop.Sdk.Extension.node20//25.08

      - name: Check whether GPG signing is configured
        id: gpg_check
        # GPG signing of OSTree commits is opt-in. When the secrets
        # are set, OSTree clients verify the signature on every
        # `flatpak install` / `flatpak update`, so a compromised
        # gh-pages host can't push malicious bits. When unset, the
        # repo serves over HTTPS only — still authenticated by
        # GitHub's TLS chain but with no signed-content guarantee.
        # See docs/flatpak-gpg-signing.md for the one-time setup.
        env:
          OSTREE_GPG_KEY_ID: ${{ secrets.OSTREE_GPG_KEY_ID }}
        run: |
          if [ -n "$OSTREE_GPG_KEY_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GPG signing: enabled (key $OSTREE_GPG_KEY_ID)"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GPG signing: disabled (OSTREE_GPG_KEY_ID secret unset)"
          fi

      - name: Import OSTree signing key
        if: steps.gpg_check.outputs.enabled == 'true'
        env:
          OSTREE_GPG_PRIVATE_KEY: ${{ secrets.OSTREE_GPG_PRIVATE_KEY }}
          OSTREE_GPG_PASSPHRASE: ${{ secrets.OSTREE_GPG_PASSPHRASE }}
        run: |
          # Use a dedicated gpg homedir under the workspace so it
          # gets cleaned up with the runner and doesn't bleed into
          # GitHub's default gpg state.
          mkdir -p "$GITHUB_WORKSPACE/.gnupg"
          chmod 700 "$GITHUB_WORKSPACE/.gnupg"
          echo "GNUPGHOME=$GITHUB_WORKSPACE/.gnupg" >> "$GITHUB_ENV"
          export GNUPGHOME="$GITHUB_WORKSPACE/.gnupg"
          # --pinentry-mode loopback lets gpg take the passphrase
          # over stdin/env. Without it gpg tries to prompt and
          # fails on a headless runner.
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo "pinentry-mode loopback" > "$GNUPGHOME/gpg.conf"
          echo "$OSTREE_GPG_PRIVATE_KEY" \
            | gpg --batch --import \
              --passphrase "${OSTREE_GPG_PASSPHRASE:-}"
          # Preset the passphrase so subsequent --gpg-sign calls
          # don't prompt during the long flatpak-builder run.
          if [ -n "${OSTREE_GPG_PASSPHRASE:-}" ]; then
            KEYGRIP=$(gpg --batch --with-keygrip --list-secret-keys \
              | awk '/Keygrip/ {print $3; exit}')
            /usr/lib/gnupg/gpg-preset-passphrase --preset \
              --passphrase "$OSTREE_GPG_PASSPHRASE" "$KEYGRIP" \
              || echo "gpg-preset-passphrase failed; signing may prompt"
          fi

      - name: Restore flatpak-builder cache
        # 526 MB native-dep build is slow; cache the build state
        # between runs. Keyed on the manifest + generated module
        # files so a dep bump invalidates. NO restore-keys fallback
        # — a near-miss on the key could restore build state for the
        # wrong set of module hashes; flatpak-builder usually
        # detects this and rebuilds the affected module, but only
        # *usually*. Exact match or cold build.
        uses: actions/cache@v4
        with:
          path: |
            .flatpak-builder
            .build-flatpak
          key: flatpak-builder-${{ hashFiles('flatpak/com.tidaldownloader.Tideway.yaml', 'flatpak/python3-requirements.json', 'flatpak/node-sources.json') }}

      - name: Seed local repo with previous gh-pages OSTree state
        # Delta updates only work when the new commit references
        # the previous commit as its parent. Without this seeding
        # step every `flatpak update` re-downloads the full 100 MB+
        # bundle instead of the few MB of code that actually
        # changed. Pull whatever OSTree state is currently published
        # to gh-pages into ./repo so flatpak-builder appends to it
        # below. First release (no prior OSTree state): nothing is
        # copied and the new commit is the root commit, same as
        # before this step existed.
        run: |
          mkdir -p repo
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --depth 1 \
              "https://github.com/${{ github.repository }}.git" gh-pages-prev
            # OSTree's on-disk layout. Other gh-pages files
            # (index.html, tideway.flatpakrepo) are not OSTree state
            # and don't need copying — publish-flatpak-repo writes
            # them fresh each run.
            for d in objects refs deltas state summary summary.sig config; do
              if [ -e "gh-pages-prev/$d" ]; then
                cp -r "gh-pages-prev/$d" "repo/$d"
              fi
            done
            rm -rf gh-pages-prev
            echo "Seeded ./repo from gh-pages:"
            ls -la repo/ | head
          else
            echo "No gh-pages branch yet; building first OSTree commit"
          fi

      - name: Build Flatpak (export to local OSTree repo)
        # `--repo` appends the new commit to ./repo. If the seed
        # step above populated it from gh-pages, the new commit
        # gets the previous one as parent and clients pull a small
        # delta. `--force-clean` keeps the BUILD dir deterministic
        # but does NOT clear --repo; ccache below keeps the C
        # builds fast across runs.
        env:
          GPG_ENABLED: ${{ steps.gpg_check.outputs.enabled }}
          OSTREE_GPG_KEY_ID: ${{ secrets.OSTREE_GPG_KEY_ID }}
        run: |
          BUILDER_ARGS=(--user --ccache --force-clean --repo=repo)
          UPDATE_ARGS=()
          if [ "$GPG_ENABLED" = "true" ]; then
            BUILDER_ARGS+=(--gpg-sign="$OSTREE_GPG_KEY_ID" --gpg-homedir="$GNUPGHOME")
            UPDATE_ARGS+=(--gpg-sign="$OSTREE_GPG_KEY_ID" --gpg-homedir="$GNUPGHOME")
          fi
          flatpak-builder "${BUILDER_ARGS[@]}" \
            .build-flatpak \
            flatpak/com.tidaldownloader.Tideway.yaml
          flatpak build-update-repo "${UPDATE_ARGS[@]}" repo

      - name: Smoke-test the running app serves the React UI
        # Verifies the user-facing URL works before we package the
        # bundle and ship it. v1.10.0 + v1.11.0 shipped with the
        # static SPA mount looking at the wrong path; the window
        # loaded "{"detail":"Not Found"}" instead of the React app
        # and nobody caught it until a user reported it. This step
        # installs to --user, launches under --browser (skips the
        # GTK window, so no xvfb needed), and asserts that the
        # root URL returns HTML with the app title in it. Fails the
        # release if not.
        run: |
          set -uo pipefail
          flatpak-builder --user --install --force-clean \
            .build-flatpak flatpak/com.tidaldownloader.Tideway.yaml
          flatpak run --user com.tidaldownloader.Tideway --browser \
            > flatpak_smoke.log 2>&1 &
          APP_PID=$!
          ok=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:47823/api/health 2>/dev/null \
                 | grep -q tidal-downloader; then
              ok=1
              break
            fi
            kill -0 "$APP_PID" 2>/dev/null || break
            sleep 1
          done
          if [ "$ok" -ne 1 ]; then
            echo "FAIL: server never bound on :47823"
            cat flatpak_smoke.log
            exit 1
          fi
          body=$(curl -fsS http://127.0.0.1:47823/)
          if ! echo "$body" | grep -qi "<title>Tideway</title>"; then
            echo "FAIL: root URL did not serve the React index.html"
            echo "----- response body -----"
            echo "$body" | head -c 500
            echo
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi
          echo "PASS: root URL serves the React index.html"
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

      - name: Build single-file .flatpak bundle from repo
        # `flatpak build-bundle` extracts a single .flatpak file
        # from the OSTree repo for users who want to install
        # directly without adding a remote. Tag-versioned to match
        # the DMG / .exe naming pattern.
        run: |
          VERSION=$(cat VERSION)
          flatpak build-bundle repo "Tideway-${VERSION}.flatpak" \
            com.tidaldownloader.Tideway master
          ls -la "Tideway-${VERSION}.flatpak"

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-Linux-Flatpak
          path: Tideway-*.flatpak
          if-no-files-found: error

      - name: Upload OSTree repo for Stage 3c (GitHub Pages publish)
        # Separate artifact so the publish job can pull just the
        # bundle, and a future Pages-publish job can pull just the
        # repo. Keeping them as siblings means we don't bake the
        # distribution mechanism into the build step.
        uses: actions/upload-artifact@v7
        with:
          name: Tideway-Linux-Flatpak-Repo
          path: repo
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Attach the artifacts to the GitHub Release. Only runs on a real
  # tag push — manual dispatch still produces the zips as workflow
  # artifacts but doesn't create a release.
  # -------------------------------------------------------------------
  publish:
    needs: [build-macos, build-windows, build-windows-arm64, build-linux-flatpak]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      # Checkout MUST come before the artifact downloads. checkout@v4
      # defaults to clean: true and runs `git clean -ffdx` against the
      # workspace, which deletes untracked files — including any
      # `artifacts/` directory we'd downloaded into beforehand. That's
      # what made v0.4.12 and v0.4.13's first attempts ship empty
      # releases: the artifacts arrived, then checkout wiped them, then
      # the upload step matched zero files. Doing checkout first means
      # the workspace is the repo, and the subsequent downloads add
      # `artifacts/` to it without anything subsequently nuking it.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - uses: actions/download-artifact@v8
        with:
          name: Tideway-macOS
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Windows
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Windows-arm64
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Linux-Flatpak
          path: artifacts

      # Diagnostic — show exactly what landed in artifacts/ so a
      # mismatched glob shows up here instead of silently producing
      # an empty release. Bit v0.4.12 and v0.4.13.
      - name: List downloaded artifacts
        run: ls -laR artifacts

      - name: Extract release notes from tag commit body
        id: notes
        # `git log -1 --format=%b` prints just the body (everything
        # after the subject line + blank line), preserving paragraph
        # breaks and markdown. Empty body = empty file = empty release
        # body, which is no worse than the old behavior.
        run: |
          set -e
          git log -1 --format=%b "${{ github.ref }}" > release_body.md
          echo "Release body (${{ github.ref_name }}):"
          echo "----"
          cat release_body.md
          echo "----"

      - name: Create / update release
        uses: softprops/action-gh-release@v3
        with:
          # Pin the tag explicitly. The action defaults to github.ref_name
          # but if a draft was created out-of-band (e.g. by a previous
          # failed run that succeeded as far as the publish job) the
          # action can end up creating an "untagged-<sha>" release
          # instead of binding to v<X.Y.Z>. That bit v0.4.11 — the
          # release published with tag_name="untagged-..." and the
          # auto-updater (which compares the tag string against the
          # installed version) couldn't see it.
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Body comes from the tag commit's message body. Stays as a
          # draft for human review before publishing — see CONTRIBUTING.md
          # "Tag the release" for the full flow.
          body_path: release_body.md
          # Glob rather than explicit filename so the version-stamped
          # asset names (Tideway-0.1.0.dmg, Tideway-setup-0.1.0.exe,
          # Tideway-setup-0.1.0-arm64.exe) land without hardcoding the
          # version in two places.
          #
          # download-artifact@v4 with `name:` extracts files directly
          # to `path` (no per-artifact subdirectory), so the layout
          # the publish step sees is flat:
          #
          #     artifacts/Tideway-<version>.dmg
          #     artifacts/Tideway-setup-<version>.exe
          #     artifacts/Tideway-setup-<version>-arm64.exe
          #
          # This glob was briefly `artifacts/**/Tideway-*` after
          # v0.4.12 shipped an empty draft (the assets were uploaded
          # by hand). The `**/` change was a guess that didn't pan
          # out — v4's behaviour with `name:` is flat, and the glob
          # silently matched nothing on v0.4.13's first attempt too.
          # Reverted to the flat pattern that actually matches what
          # v4 produces.
          files: |
            artifacts/Tideway-*.dmg
            artifacts/Tideway-setup-*.exe
            artifacts/Tideway-*.flatpak
          # draft: true so the maintainer can review the auto-populated
          # notes (and edit / restructure if needed) before publishing.
          # Publishing a draft is what actually triggers the auto-update
          # check on user installs — /releases/latest excludes drafts.
          draft: true
          # generate_release_notes: false because we already have notes
          # from the commit body. Setting true would make the action
          # append GitHub's auto-generated changelog (linked PRs since
          # last tag) on TOP of our curated body, which doubles up.
          generate_release_notes: false
          # Mark tags containing a hyphen (v0.2.0-rc1 etc.) as
          # prereleases automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}

  # -------------------------------------------------------------------
  # Publish the OSTree repo from build-linux-flatpak to GitHub Pages
  # so users can `flatpak remote-add` and get `flatpak update`
  # support. The bundle on the release page covers the one-shot
  # install case; this covers the subscribe-and-auto-update case.
  #
  # Runs after `publish` because the GitHub Release draft is what
  # signals a real shipping tag — pre-release builds via
  # workflow_dispatch don't publish to Pages.
  # -------------------------------------------------------------------
  publish-flatpak-repo:
    needs: [publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Linux-Flatpak-Repo
          path: ostree-repo

      - name: Drop the .flatpakrepo subscribe file next to the OSTree repo
        # Users add the remote with `flatpak remote-add ... tideway.flatpakrepo`.
        # The file lives at flatpak/tideway.flatpakrepo and gets served
        # at https://j-m-punk.github.io/tideway/tideway.flatpakrepo.
        #
        # When the project's GPG public key is committed at
        # flatpak/tideway-release.pub.gpg (part of the opt-in OSTree
        # signing setup in docs/flatpak-gpg-signing.md), we append a
        # `GpgKey=` line containing its base64 so newly-added remotes
        # turn on signature verification automatically. Without it,
        # Flatpak adds the remote in no-gpg-verify mode, which still
        # works but trusts only HTTPS for content authenticity.
        run: |
          cp flatpak/tideway.flatpakrepo ostree-repo/tideway.flatpakrepo
          if [ -f flatpak/tideway-release.pub.gpg ]; then
            GPGKEY_B64=$(base64 -w 0 flatpak/tideway-release.pub.gpg)
            printf 'GpgKey=%s\n' "$GPGKEY_B64" >> ostree-repo/tideway.flatpakrepo
            echo "Embedded GPG public key in tideway.flatpakrepo"
          else
            echo "No flatpak/tideway-release.pub.gpg checked in — remote will install in no-gpg-verify mode"
          fi

      - name: Drop an index.html that links the subscribe file + bundle
        # GitHub Pages serves whatever you point it at; without an
        # index page, the bare root URL renders an empty directory
        # listing. A minimal page that explains the install paths
        # makes the URL discoverable for anyone landing on it.
        run: |
          VERSION=$(cat VERSION)
          cat > ostree-repo/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Tideway — Linux install</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
              h1 { margin-top: 0; }
              code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
              pre { background: #f5f5f5; padding: 0.75rem 1rem; border-radius: 6px; overflow-x: auto; }
              a { color: #2563eb; }
            </style>
          </head>
          <body>
            <h1>Tideway — Linux install</h1>
            <p>Tideway ships as a Flatpak for Linux. Two ways to install.</p>

            <h2>Auto-updating (recommended)</h2>
            <p>Subscribe to this Flatpak repo once; <code>flatpak update</code> pulls new releases.</p>
            <pre>flatpak remote-add --user --if-not-exists tideway \\
              https://j-m-punk.github.io/tideway/tideway.flatpakrepo
            flatpak install --user tideway com.tidaldownloader.Tideway</pre>

            <h2>One-shot bundle</h2>
            <p>Download <code>Tideway-${VERSION}.flatpak</code> from the <a href="https://github.com/J-M-PUNK/tideway/releases/latest">latest release</a>, then:</p>
            <pre>flatpak install --user --bundle Tideway-${VERSION}.flatpak</pre>
            <p>Won't auto-update; grab a newer bundle when you want to upgrade.</p>

            <p style="margin-top:3rem; color:#666;">
              <a href="https://github.com/J-M-PUNK/tideway">Project on GitHub</a>
            </p>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ostree-repo
          # Each release replaces the previous OSTree repo content;
          # users `flatpak update` against the new commit. `keep_files:
          # false` cleans out stale objects from old releases so the
          # branch doesn't grow unboundedly.
          keep_files: false
          commit_message: "Publish Flatpak repo for ${{ github.ref_name }}"
