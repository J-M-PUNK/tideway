name: Release

# Trigger on any pushed tag that looks like a version (v0.2.0, v1.0.0-rc1,
# etc). Manual dispatch is also supported so you can rebuild without
# cutting a new tag — useful when CI flaked.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0). Leave blank to build HEAD."
        required: false

# Single source of truth for runtime versions. Bumping either here
# also has to be matched in .github/workflows/test.yml so CI and the
# release runner agree on what they're testing against.
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------
  # macOS .app bundle (per-arch). Matrix-builds an arm64 slice on
  # macos-14 and an x86_64 slice on macos-13, in parallel. Each runner
  # produces a single-arch .app; they're tarred (to preserve symlinks
  # that GitHub's zip-based artifacts would otherwise dereference) and
  # uploaded as intermediate artifacts. The downstream
  # merge-macos-universal job lipo-fuses them into one universal2 .app
  # which is what actually ships in the release.
  #
  # Why pinning macos-13 for the x64 build:
  #
  #   GitHub's macos-13 runner is the last x64-native macOS image
  #   (macos-14 and macos-15 are arm64-only). Building x64 on an arm64
  #   runner via Rosetta is technically possible but the Python wheels
  #   come back arm64 anyway because pip resolves against the host
  #   arch, not the target. Native x64 runner = native x64 wheels.
  #
  # First-launch on the resulting universal DMG still shows
  # Gatekeeper's "cannot be verified" warning (build is unsigned /
  # unnotarized); README covers right-click → Open.
  # -------------------------------------------------------------------
  build-macos:
    strategy:
      # fail-fast: false lets the other arch finish even if one fails
      # — useful when investigating per-arch wheel issues.
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-mac.spec --noconfirm

      - name: Verify native libraries bundled
        # Backstop against the curl-cffi-missing-from-bundle (v0.4.7)
        # regression. PyInstaller's static analysis routinely misses
        # native libs that get loaded via ctypes / CFFI at runtime,
        # and curl-cffi falling back to plain requests would silently
        # drop our TLS-fingerprint match. Runs per-arch so a wheel
        # missing on just one arch shows up here, before the lipo
        # merge muddies the diagnostic.
        #
        # tls_client used to be checked here too — we deliberately
        # stopped bundling it in v0.4.11 because its Go-CGO DLL was
        # crashing the Windows app, and spotapi now talks to Spotify
        # through curl-cffi via app/spotify_curl_session.py instead.
        # If you're tempted to add it back: don't, the broken
        # transport stays out of the bundle on purpose.
        run: |
          set -e
          APP_DIR="dist/Tideway.app/Contents"
          required_globs=(
            "*/curl_cffi/_wrapper*.so"
          )
          for pat in "${required_globs[@]}"; do
            count=$(find "$APP_DIR" -path "$pat" 2>/dev/null | wc -l | tr -d ' ')
            if [ "$count" -eq 0 ]; then
              echo "::error ::Missing native library matching $pat in macOS bundle (${{ matrix.arch }})"
              echo "PyInstaller didn't pick up a runtime-loaded dylib."
              echo "Check the collect_all() list in Tideway-mac.spec."
              exit 1
            fi
            echo "OK: found $count file(s) matching $pat (${{ matrix.arch }})"
          done

      - name: Tar the .app for the merge job
        # tar instead of upload-artifact-with-bare-directory, because
        # GitHub Actions zips the artifact contents and zip dereferences
        # symlinks. Mach-O bundles can have symlinks (Frameworks, dylib
        # alias names) that would break if dereferenced, so we tar
        # first and ship the tarball as the artifact's payload.
        run: |
          cd dist
          tar -cf "Tideway-${{ matrix.arch }}.app.tar" Tideway.app

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-macOS-${{ matrix.arch }}-app
          path: dist/Tideway-${{ matrix.arch }}.app.tar
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Lipo-merge the two arch-specific .app bundles into one universal2
  # .app and package the result as the single Tideway-<version>.dmg
  # release asset. Runs on macos-14 because lipo is macOS-only and
  # the build is fast enough that runner choice doesn't matter.
  #
  # The result is a single DMG that runs natively on both Apple
  # Silicon and Intel Macs — same model Discord, Slack, Zoom, and
  # 1Password ship on the Mac, and it's how we get to "one download
  # link per OS" without making the user know what CPU they have.
  # -------------------------------------------------------------------
  merge-macos-universal:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v8
        with:
          name: Tideway-macOS-arm64-app
          path: in/arm64

      - uses: actions/download-artifact@v8
        with:
          name: Tideway-macOS-x64-app
          path: in/x64

      - name: Untar arch-specific .app bundles
        run: |
          set -euo pipefail
          tar -xf in/arm64/Tideway-arm64.app.tar -C in/arm64
          tar -xf in/x64/Tideway-x64.app.tar -C in/x64
          ls -la in/arm64 in/x64

      - name: Lipo-merge into universal2 .app
        run: |
          mkdir -p merged
          bash scripts/lipo_merge_macos.sh \
            in/arm64/Tideway.app \
            in/x64/Tideway.app \
            merged/Tideway.app

      - name: Verify merged .app is universal2
        # Double-check the main executable now reports both arm64 and
        # x86_64. If lipo merge silently dropped a slice, the binary
        # would still launch on ONE arch and break on the other; this
        # check fails the build before users get a half-working DMG.
        run: |
          set -e
          MAIN_EXE="merged/Tideway.app/Contents/MacOS/Tideway"
          if [ ! -f "$MAIN_EXE" ]; then
            echo "::error ::merged main executable missing at $MAIN_EXE"
            exit 1
          fi
          archs=$(lipo -archs "$MAIN_EXE")
          echo "Main executable architectures: $archs"
          if ! echo "$archs" | grep -q "arm64"; then
            echo "::error ::merged main executable has no arm64 slice (got: $archs)"
            exit 1
          fi
          if ! echo "$archs" | grep -q "x86_64"; then
            echo "::error ::merged main executable has no x86_64 slice (got: $archs)"
            exit 1
          fi
          echo "OK: main executable is universal2"

      - name: Build DMG from merged .app
        run: bash scripts/build_dmg.sh merged/Tideway.app

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-macOS
          path: dist/Tideway-*.dmg
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Windows. Produces Tideway-setup-<version>.exe — the Inno Setup
  # installer. Users double-click it, click through the wizard, get a
  # Start Menu entry + uninstaller registered with Apps & features.
  # SmartScreen warning on first launch (build is unsigned); README
  # covers "More info → Run anyway." The auto-update install button
  # downloads and runs this same .exe.
  # -------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-win.spec --noconfirm

      - name: Verify native libraries bundled
        # Backstop against the curl-cffi-missing-from-bundle (v0.4.7)
        # regression. PyInstaller's static analysis routinely misses
        # native libs that get loaded via ctypes / CFFI at runtime,
        # and curl-cffi falling back to plain requests would silently
        # drop our TLS-fingerprint match.
        #
        # tls-client-*.dll used to be checked here too — we
        # deliberately stopped bundling it in v0.4.11 because its
        # Go-CGO DLL was crashing the Windows app at offset 0x66621
        # on first Spotify enrichment call, and spotapi now talks to
        # Spotify through curl-cffi via app/spotify_curl_session.py
        # instead. If you're tempted to add it back: don't, the
        # broken transport stays out of the bundle on purpose.
        shell: pwsh
        run: |
          $appRoot = "dist\Tideway"
          $missing = $false
          foreach ($pat in @("_wrapper*")) {
            $files = Get-ChildItem -Path $appRoot -Recurse -Filter $pat -ErrorAction SilentlyContinue
            if (-not $files) {
              Write-Host "::error ::Missing native library matching $pat in Windows bundle"
              $missing = $true
            } else {
              Write-Host "OK: found $($files.Count) file(s) matching $pat"
            }
          }
          if ($missing) {
            Write-Host "PyInstaller didn't pick up a runtime-loaded DLL. Check collect_all() in Tideway-win.spec."
            exit 1
          }

      - name: Install Inno Setup
        # Chocolatey is preinstalled on windows-latest. The package
        # name is `innosetup`; --no-progress keeps the log readable.
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        # ISCC.exe lives in the standard Program Files (x86) location
        # after the choco install. Output filename
        # (Tideway-setup-<version>.exe) is set by scripts/Tideway.iss.
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\Tideway.iss

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-Windows
          path: dist/Tideway-setup-*.exe
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Windows ARM64. Same flow as build-windows but on a native ARM64
  # runner so PyInstaller produces an ARM64 binary and pip pulls the
  # win_arm64 wheels (sounddevice ships separate per-arch wheels with
  # the matching libportaudio*.dll, so an x64 build cannot be used on
  # an ARM64 host even under Prism emulation).
  #
  # Output: Tideway-setup-<version>-arm64.exe.
  # -------------------------------------------------------------------
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: "arm64"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-win.spec --noconfirm

      - name: Verify native libraries bundled
        # Backstop against the curl-cffi-missing-from-bundle (v0.4.7)
        # regression. PyInstaller's static analysis routinely misses
        # native libs that get loaded via ctypes / CFFI at runtime,
        # and curl-cffi falling back to plain requests would silently
        # drop our TLS-fingerprint match.
        #
        # tls-client-*.dll used to be checked here too — we
        # deliberately stopped bundling it in v0.4.11 because its
        # Go-CGO DLL was crashing the Windows app at offset 0x66621
        # on first Spotify enrichment call, and spotapi now talks to
        # Spotify through curl-cffi via app/spotify_curl_session.py
        # instead. If you're tempted to add it back: don't, the
        # broken transport stays out of the bundle on purpose.
        shell: pwsh
        run: |
          $appRoot = "dist\Tideway"
          $missing = $false
          foreach ($pat in @("_wrapper*")) {
            $files = Get-ChildItem -Path $appRoot -Recurse -Filter $pat -ErrorAction SilentlyContinue
            if (-not $files) {
              Write-Host "::error ::Missing native library matching $pat in Windows bundle"
              $missing = $true
            } else {
              Write-Host "OK: found $($files.Count) file(s) matching $pat"
            }
          }
          if ($missing) {
            Write-Host "PyInstaller didn't pick up a runtime-loaded DLL. Check collect_all() in Tideway-win.spec."
            exit 1
          }

      - name: Install Inno Setup
        # Chocolatey on the ARM64 runner installs the x86 ISCC.exe; it
        # runs fine under Prism emulation and the installer it produces
        # is the architecture we tell it to target via /DBuildArch.
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        # /DBuildArch=arm64 makes the .iss script append "-arm64" to the
        # output filename and pin ArchitecturesAllowed to arm64.
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DBuildArch=arm64 scripts\Tideway.iss

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-Windows-arm64
          path: dist/Tideway-setup-*-arm64.exe
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Linux AppImage. Produces Tideway-<version>-x86_64.AppImage — a
  # single executable users can chmod +x and run on any glibc-based
  # distro. EXPERIMENTAL: no maintainer Linux test environment, so
  # cold-launch issues are user-reported rather than caught in CI.
  # README marks the install as experimental and lists the runtime
  # system deps the AppImage relies on (GTK3, WebKit2GTK, PortAudio,
  # libnotify) rather than bundling them.
  # -------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    # Pinned to 22.04 deliberately. AppImage's portability story is
    # "build on the oldest glibc you want to support, run on anything
    # newer." 22.04 ships glibc 2.35; that covers Ubuntu 22.04+,
    # Debian 12+, Fedora 36+, openSUSE Leap 15.5+. Building on
    # ubuntu-latest (24.04, glibc 2.39) would silently break users
    # on anything older than ~Ubuntu 24.04.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Linux build + runtime dependencies
        # Build-time: dev headers for the libs PyInstaller's static
        # analyzer dlopens, plus libfuse2 because appimagetool's
        # runtime is a FUSE-based AppImage itself.
        # Runtime: GTK3 + WebKit2GTK 4.1 (pywebview), libportaudio2
        # (sounddevice), libnotify4. These are also installed so
        # PyInstaller's import probes succeed; on the user's machine
        # they need to install equivalents for their distro (README
        # lists them).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libportaudio2 \
            libnotify4 \
            libfuse2 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Run PyInstaller
        run: pyinstaller Tideway-linux.spec --noconfirm

      - name: Build AppImage
        # appimagetool needs to call FUSE; on the GitHub Actions
        # runner FUSE is loadable but appimagetool's own AppImage
        # runtime can't always self-mount. APPIMAGE_EXTRACT_AND_RUN
        # tells it to extract to a temp dir and run from there
        # instead — slower but doesn't depend on /dev/fuse perms.
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: bash scripts/build_appimage.sh

      - uses: actions/upload-artifact@v7
        with:
          name: Tideway-Linux
          path: dist/Tideway-*-x86_64.AppImage
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Attach the artifacts to the GitHub Release. Only runs on a real
  # tag push — manual dispatch still produces the zips as workflow
  # artifacts but doesn't create a release.
  # -------------------------------------------------------------------
  publish:
    needs: [merge-macos-universal, build-windows, build-windows-arm64, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      # Checkout MUST come before the artifact downloads. checkout@v4
      # defaults to clean: true and runs `git clean -ffdx` against the
      # workspace, which deletes untracked files — including any
      # `artifacts/` directory we'd downloaded into beforehand. That's
      # what made v0.4.12 and v0.4.13's first attempts ship empty
      # releases: the artifacts arrived, then checkout wiped them, then
      # the upload step matched zero files. Doing checkout first means
      # the workspace is the repo, and the subsequent downloads add
      # `artifacts/` to it without anything subsequently nuking it.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - uses: actions/download-artifact@v8
        with:
          name: Tideway-macOS
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Windows
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Windows-arm64
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Tideway-Linux
          path: artifacts

      # Diagnostic — show exactly what landed in artifacts/ so a
      # mismatched glob shows up here instead of silently producing
      # an empty release. Bit v0.4.12 and v0.4.13.
      - name: List downloaded artifacts
        run: ls -laR artifacts

      - name: Extract release notes from tag commit body
        id: notes
        # `git log -1 --format=%b` prints just the body (everything
        # after the subject line + blank line), preserving paragraph
        # breaks and markdown. Empty body = empty file = empty release
        # body, which is no worse than the old behavior.
        run: |
          set -e
          git log -1 --format=%b "${{ github.ref }}" > release_body.md
          echo "Release body (${{ github.ref_name }}):"
          echo "----"
          cat release_body.md
          echo "----"

      - name: Create / update release
        uses: softprops/action-gh-release@v3
        with:
          # Pin the tag explicitly. The action defaults to github.ref_name
          # but if a draft was created out-of-band (e.g. by a previous
          # failed run that succeeded as far as the publish job) the
          # action can end up creating an "untagged-<sha>" release
          # instead of binding to v<X.Y.Z>. That bit v0.4.11 — the
          # release published with tag_name="untagged-..." and the
          # auto-updater (which compares the tag string against the
          # installed version) couldn't see it.
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Body comes from the tag commit's message body. Stays as a
          # draft for human review before publishing — see CONTRIBUTING.md
          # "Tag the release" for the full flow.
          body_path: release_body.md
          # Glob rather than explicit filename so the version-stamped
          # asset names (Tideway-0.1.0.dmg, Tideway-setup-0.1.0.exe,
          # Tideway-setup-0.1.0-arm64.exe) land without hardcoding the
          # version in two places.
          #
          # download-artifact@v4 with `name:` extracts files directly
          # to `path` (no per-artifact subdirectory), so the layout
          # the publish step sees is flat:
          #
          #     artifacts/Tideway-<version>.dmg
          #     artifacts/Tideway-setup-<version>.exe
          #     artifacts/Tideway-setup-<version>-arm64.exe
          #
          # This glob was briefly `artifacts/**/Tideway-*` after
          # v0.4.12 shipped an empty draft (the assets were uploaded
          # by hand). The `**/` change was a guess that didn't pan
          # out — v4's behaviour with `name:` is flat, and the glob
          # silently matched nothing on v0.4.13's first attempt too.
          # Reverted to the flat pattern that actually matches what
          # v4 produces.
          files: |
            artifacts/Tideway-*.dmg
            artifacts/Tideway-setup-*.exe
            artifacts/Tideway-*-x86_64.AppImage
          # draft: true so the maintainer can review the auto-populated
          # notes (and edit / restructure if needed) before publishing.
          # Publishing a draft is what actually triggers the auto-update
          # check on user installs — /releases/latest excludes drafts.
          draft: true
          # generate_release_notes: false because we already have notes
          # from the commit body. Setting true would make the action
          # append GitHub's auto-generated changelog (linked PRs since
          # last tag) on TOP of our curated body, which doubles up.
          generate_release_notes: false
          # Mark tags containing a hyphen (v0.2.0-rc1 etc.) as
          # prereleases automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
