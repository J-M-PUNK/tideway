name: Update flatpak python3-requirements.json

# Regenerates flatpak/python3-requirements.json — the offline, hashed
# PyPI source set the Flatpak build installs from — with
# flatpak-pip-generator, and commits the result back to the branch.
#
# This is the Python counterpart of update-flatpak-node-sources.yml.
# Before it existed, bumping requirements.txt required a manual Linux VM
# run (see docs/linux-flatpak.md) to keep the Flatpak offline mirror in
# sync, which is easy to forget and fails the build with a missing
# wheel. Now a requirements.txt change (or a manual dispatch) regenerates
# it in CI so contributors without a Linux box can keep the Flatpak
# buildable.
#
# The generation flags are transcribed from docs/linux-flatpak.md:
#   --runtime org.gnome.Sdk//49   wheel selection must match the runtime
#                                 Python ABI the manifest pins.
#   --prefer-wheels <pkgs>        Rust / Cython transitives whose PEP-517
#                                 sdist build backends aren't in the
#                                 build sandbox — force their prebuilt
#                                 wheels instead.
#
# The generated file is only trustworthy once flatpak-build-check.yml
# builds the whole manifest against it (that job triggers on the same
# requirements.txt path and on flatpak/** changes), so a bad generation
# surfaces as a red build, not a broken release.
on:
  push:
    branches:
      - "**"
    paths:
      - "requirements.txt"
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          # Check out the real branch so the commit lands on it rather
          # than the detached HEAD a default checkout produces.
          ref: ${{ github.ref }}

      - name: Install flatpak + ostree
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak ostree
          flatpak --version

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME 49 Sdk
        # flatpak-pip-generator's --runtime resolves wheels by running
        # pip inside this Sdk, so the Python ABI matches the manifest's
        # pinned org.gnome.Platform//49. Same runtime version the build
        # jobs pull.
        run: |
          flatpak install --user -y --no-deps flathub \
            org.gnome.Platform//49 \
            org.gnome.Sdk//49

      - name: Fetch flatpak-pip-generator
        # The pip generator ships as a standalone script in
        # flatpak-builder-tools (not a PyPI console script like
        # flatpak-node-generator). Pull it from the upstream repo and
        # install its one runtime dependency. The historical
        # `pip/flatpak-pip-generator` path is now a git symlink to the
        # .py file, and raw.githubusercontent serves a symlink as its
        # one-line target text — fetch the real file.
        run: |
          curl -fsSL -o flatpak-pip-generator \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/pip/flatpak-pip-generator.py
          head -1 flatpak-pip-generator | grep -q python || {
            echo "downloaded file is not the generator script:"; head -3 flatpak-pip-generator; exit 1; }
          # Matches the script's PEP 723 inline metadata block.
          python3 -m pip install --quiet "requirements-parser<1.0.0,>=0.11.0" "packaging>=23.0"

      - name: Regenerate python3-requirements.json
        # --requirements-file mirrors docs/linux-flatpak.md ("generated
        # offline+hashed from requirements.txt"). Platform markers in
        # requirements.txt are resolved for the Linux/GNOME target, so
        # the darwin-only pyobjc drops out and the linux-only dbus-next
        # is included automatically. --prefer-wheels forces prebuilt
        # wheels over sdists (the Rust/Cython transitives — orjson,
        # curl-cffi, av, numpy, scipy, pydantic-core, ... — have no
        # PEP-517 build backend in the sandbox); it falls back to an
        # sdist only where no wheel exists. Output name matches the
        # module the manifest references (python3-requirements).
        run: |
          python3 flatpak-pip-generator \
            --runtime="org.gnome.Sdk//49" \
            --prefer-wheels \
            --requirements-file=requirements.txt \
            --output=flatpak/python3-requirements

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flatpak/python3-requirements.json
          if git diff --cached --quiet; then
            echo "python3-requirements.json unchanged — nothing to commit"
          else
            git commit -m "Regenerate flatpak/python3-requirements.json

          Triggered by a change to requirements.txt.
          Generated by flatpak-pip-generator against the GNOME 49 Sdk."
            git push
          fi
