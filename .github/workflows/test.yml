name: Tests

# Runs on every PR (any base branch, but in practice → main) and on
# every push that lands on main, so a regression that slipped past PR
# review still surfaces on the default branch. The release workflow
# only fires on tag pushes; this is the safety net that runs against
# regular code changes so a broken PR doesn't merge silently the way
# the curl-cffi-missing-from-bundle bug did.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any older in-progress run on the same ref when a new commit
# lands. Keeps the queue reasonable when someone pushes several quick
# fixups during a code review.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Single source of truth for runtime versions. Bumping either here
# also has to be matched in .github/workflows/release.yml so the
# CI version and the release version stay in sync (a mismatch means
# CI passes on a Python that doesn't match what we ship).
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------
  # Backend: Python pytest. Uses the PYTHON_VERSION from the top-level
  # env block, which the release workflow also reads from, so a bump
  # here moves both jobs together.
  # -------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        # sounddevice needs the PortAudio shared lib and PyAV needs
        # ffmpeg/libav. Both ship as wheels on PyPI but the sounddevice
        # wheel doesn't bundle libportaudio for Linux (Linux installs
        # are expected to pick up the system one), so install via apt.
        # PyAV's wheels DO bundle libav, so ffmpeg here is belt-and-
        # suspenders for any test that invokes ffmpeg directly.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pytest + httpx are dev-time only; not in requirements.txt
          # because the packaged app doesn't need them at runtime.
          pip install pytest httpx

      - name: Run pytest
        run: pytest tests/ --tb=short -v

  # -------------------------------------------------------------------
  # Frontend: TypeScript build + vitest. Runs in parallel with the
  # backend job so a Python failure doesn't block the JS report and
  # vice versa.
  # -------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type-check
        # tsc -b runs the full project-references build without
        # emitting JS, which is what we want for a CI check — same
        # invocation as `vite build`'s pre-step.
        working-directory: web
        run: npx tsc -b --noEmit

      - name: ESLint
        working-directory: web
        run: npm run lint

      - name: Stylelint
        working-directory: web
        run: npm run lint:css

      - name: HTMLHint
        working-directory: web
        run: npm run lint:html

      - name: Prettier
        # `format:check` exits non-zero when any file isn't already
        # in Prettier's canonical form. Pairs with the local
        # `npm run format` script the user runs before committing.
        working-directory: web
        run: npm run format:check

      - name: Run vitest
        working-directory: web
        run: npm test
